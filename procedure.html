<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>手続きを選択 - 管理者報告フロー統合パネル</title>

<link rel="stylesheet" href="common.css">
<style>
.select-wrap{display:flex;align-items:center;justify-content:center;flex:1;padding:2rem 1.5rem}
.select-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);box-shadow:var(--shadow-md);max-width:640px;width:100%;overflow:hidden;animation:slideUp .4s cubic-bezier(.22,1,.36,1)}
.select-hd{padding:2rem 2rem 1.5rem;text-align:center;background:linear-gradient(135deg,var(--primary-light),var(--surface-2) 80%);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.select-hd::before{content:'';position:absolute;top:-50%;left:-20%;width:200px;height:200px;background:radial-gradient(circle,var(--primary-glow),transparent 70%);pointer-events:none}
.select-hd svg{width:48px;height:48px;color:var(--primary);filter:drop-shadow(0 2px 4px var(--primary-glow));margin-bottom:.8rem}
.select-hd h3{font-size:1.15rem;font-weight:700;margin-bottom:.3rem}
.select-hd p{font-size:.82rem;color:var(--muted);line-height:1.5}
.select-bd{padding:1.5rem 2rem 2rem}

.proc-btn{display:flex;align-items:center;gap:1.2rem;width:100%;padding:1.2rem 1.4rem;margin-bottom:1rem;background:var(--surface-2);border:2px solid var(--border);border-radius:var(--r-xl);text-align:left;transition:all .3s cubic-bezier(.4,0,.2,1);text-decoration:none;color:inherit;position:relative;overflow:hidden}
.proc-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(108,99,255,.1),transparent);transition:left .5s ease}
.proc-btn:hover::before{left:100%}
.proc-btn:last-child{margin-bottom:0}
.proc-btn:hover{border-color:var(--primary);background:var(--primary-light);box-shadow:var(--shadow-md);transform:translateY(-3px) scale(1.02)}
.proc-btn:active{transform:translateY(0) scale(.98);box-shadow:var(--shadow-sm)}
.proc-icon{width:3.2rem;height:3.2rem;border-radius:var(--r-lg);display:grid;place-items:center;font-size:1.5rem;flex-shrink:0;transition:all .3s cubic-bezier(.4,0,.2,1);background:var(--primary-light);color:var(--primary)}
.proc-btn:hover .proc-icon{background:var(--primary);color:var(--inv);transform:scale(1.1) rotate(5deg)}
.proc-text{flex:1;min-width:0}
.proc-text strong{display:block;font-size:1rem;font-weight:700;margin-bottom:.15rem}
.proc-text span{display:block;font-size:.78rem;color:var(--muted);line-height:1.4}
.proc-arrow{font-size:1.2rem;color:var(--faint);flex-shrink:0;transition:all .3s cubic-bezier(.4,0,.2,1)}
.proc-btn:hover .proc-arrow{color:var(--primary);transform:translateX(6px)}
.proc-btn.highlighted{border-color:var(--robot-accent);background:var(--robot-accent-light);box-shadow:0 0 0 3px rgba(255,107,157,.2),var(--shadow-md);transform:translateY(-3px) scale(1.02)}
.proc-btn.highlighted .proc-icon{background:var(--robot-accent);color:var(--inv);transform:scale(1.1)}
.proc-btn.dimmed{opacity:.4;transform:scale(.97)}

.mail-section{max-width:640px;width:100%;margin:0 auto 1.5rem;padding:0 1.5rem}
.mail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);box-shadow:var(--shadow-sm);overflow:hidden;animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.mail-hd{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem}
.mail-hd svg{width:24px;height:24px;color:var(--primary);flex-shrink:0}
.mail-hd h3{font-size:.92rem;font-weight:700}
.mail-hd p{font-size:.74rem;color:var(--muted)}
.mail-bd{padding:1rem 1.5rem 1.2rem}
.mail-textarea{width:100%;min-height:100px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--r-md);padding:.7rem .9rem;font-size:.82rem;line-height:1.6;resize:vertical;transition:border-color .2s,box-shadow .2s;font-family:var(--font)}
.mail-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.mail-textarea::placeholder{color:var(--faint)}
.mail-btn-row{display:flex;gap:.6rem;margin-top:.8rem;align-items:center}
.mail-judge-btn{padding:.55rem 1.3rem;font-size:.82rem;font-weight:700;border-radius:var(--pill);background:var(--primary);color:var(--inv);border:none;box-shadow:0 2px 8px var(--primary-glow);transition:all .25s cubic-bezier(.4,0,.2,1)}
.mail-judge-btn:hover{background:var(--primary-2);box-shadow:0 4px 16px var(--primary-glow);transform:translateY(-1px)}
.mail-judge-btn:active{transform:translateY(0)}
.mail-result{margin-top:.7rem;padding:.6rem .9rem;border-radius:var(--r-md);font-size:.8rem;line-height:1.5;display:none}
.mail-result.show{display:block}
.mail-result.success{background:var(--success-soft);color:var(--success);border:1px solid var(--success)}
.mail-result.info{background:var(--blue-soft);color:var(--blue);border:1px solid var(--blue)}
.mail-result.warn{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn)}

.ai-result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.2rem;margin-top:.8rem;animation:slideUp .3s ease}
.ai-result-header{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.ai-badge{background:var(--primary);color:var(--inv);padding:.3rem .8rem;border-radius:var(--pill);font-size:.82rem;font-weight:700}
.ai-confidence{font-size:.78rem;color:var(--muted)}
.ai-result-reason{font-size:.85rem;color:var(--text);line-height:1.5;margin-bottom:.8rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.ai-result-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.5rem;margin-bottom:1rem}
.ai-detail{font-size:.82rem;padding:.4rem .6rem;background:var(--surface-2);border-radius:var(--r-sm)}
.ai-detail strong{color:var(--primary);margin-right:.3rem}
.ai-result-actions{display:flex;justify-content:flex-end}
.ai-action-btn{background:var(--primary);color:var(--inv);padding:.6rem 1.2rem;border-radius:var(--pill);font-size:.82rem;font-weight:700;border:none;cursor:pointer;transition:all .2s ease}
.ai-action-btn:hover{background:var(--primary-2);transform:translateY(-1px)}
.ai-loading{color:var(--primary);text-align:center;padding:1rem}
.ai-error{color:var(--error);background:var(--error-soft);border:1px solid var(--error);padding:.6rem .9rem;border-radius:var(--r-md);font-size:.8rem}
.ai-warn{color:var(--warn);background:var(--warn-soft);border:1px solid var(--warn);padding:.6rem .9rem;border-radius:var(--r-md);font-size:.8rem}

@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.select-hd svg{animation:float 3s ease-in-out infinite}
.progress-section{max-width:640px;width:100%;margin:0 auto 1.5rem;padding:0 1.5rem}
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);box-shadow:var(--shadow-sm);overflow:hidden;animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.progress-hd{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem}
.progress-hd svg{width:24px;height:24px;color:var(--primary);flex-shrink:0}
.progress-hd h3{font-size:.92rem;font-weight:700}

.progress-bd{padding:1rem 1.5rem 1.2rem}
.csv-btn-row{display:flex;gap:.6rem;margin-bottom:1rem;align-items:center}
.csv-load-btn{padding:.55rem 1.3rem;font-size:.82rem;font-weight:700;border-radius:var(--pill);background:var(--blue);color:var(--inv);border:none;box-shadow:0 2px 8px rgba(66,153,225,.2);transition:all .25s cubic-bezier(.4,0,.2,1)}
.csv-load-btn:hover{background:var(--primary);box-shadow:0 4px 16px var(--primary-glow);transform:translateY(-1px)}
.csv-load-btn:active{transform:translateY(0)}
.csv-status{font-size:.78rem;color:var(--muted)}
.progress-table-wrap{overflow-x:auto}
.progress-table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:800px}
.progress-table th{padding:.6rem .8rem;text-align:left;font-weight:700;border-bottom:2px solid var(--border);color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.progress-table td{padding:.6rem .8rem;border-bottom:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-table tr:hover td{background:var(--surface-2)}
.status-badge{display:inline-block;padding:.2rem .6rem;border-radius:var(--pill);font-size:.72rem;font-weight:700}
.status-badge.not-started{background:var(--surface-3);color:var(--muted)}
.status-badge.drafting{background:var(--warn-soft);color:var(--warn)}
.status-badge.in-progress{background:var(--blue-soft);color:var(--blue)}
.status-badge.completed{background:var(--success-soft);color:var(--success)}
.progress-bar{width:60px;height:6px;background:var(--surface-3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);transition:width .3s}
.progress-bar-fill.not-started{width:0;background:var(--muted)}
.progress-bar-fill.drafting{width:33%;background:var(--warn)}
.progress-bar-fill.in-progress{width:66%;background:var(--blue)}
.progress-bar-fill.completed{width:100%;background:var(--success)}
.csv-empty{text-align:center;padding:1.5rem;color:var(--muted)}
.csv-empty svg{width:32px;height:32px;margin-bottom:.5rem;opacity:.4}
.csv-empty p{font-size:.85rem;margin-bottom:.2rem}

@media(max-width:560px){

.brand h1{font-size:.9rem}
.brand p{font-size:.7rem}
.mail-section{padding:0 .85rem}
.mail-bd{padding:.8rem 1rem 1rem}
}
</style>

<script>
// ============================================================
// keywords.csv からキーワード辞書を読み込む
// ============================================================
var keywordDict={};

function loadKeywordDict(){
fetch('keywords.csv')
.then(function(res){
if(!res.ok)throw new Error('keywords.csv not found');
return res.text();
})
.then(function(csv){
parseKeywordCSV(csv);
console.log('[keywordDict] loaded',Object.keys(keywordDict).length,'procedures');
})
.catch(function(err){
console.warn('[keywordDict] load failed:',err.message);
});
}

function parseKeywordCSV(text){
text=text.replace(/^\uFEFF/,'');
var lines=text.split(/\r?\n/);
var headers=lines[0].split(',').map(function(h){return h.trim();});
var colProc=headers.indexOf('手続き');
var colKw=headers.indexOf('キーワード');
if(colProc===-1||colKw===-1)return;

for(var i=1;i<lines.length;i++){
var line=lines[i].trim();
if(!line)continue;
var cols=line.split(',').map(function(c){return c.trim();});
var procedure=cols[colProc];
var keyword=cols[colKw];
if(procedure&&keyword){
if(!keywordDict[procedure])keywordDict[procedure]=[];
keywordDict[procedure].push(keyword);
}
}
}

loadKeywordDict();

// ============================================================
// 手続き判定
// ============================================================
document.getElementById('judgeBtn').addEventListener('click',function(){
var text=document.getElementById('mailInput').value.trim();
var result=document.getElementById('mailResult');
var buttons=document.querySelectorAll('.proc-btn');

if(!text){
result.className='mail-result show warn';
result.textContent='⚠️ メール本文を貼り付けてください。';
buttons.forEach(function(btn){btn.classList.remove('highlighted','dimmed');});
return;
}

var t=text.replace(/\s/g,'');
var bestMatch={procedure:null,count:0};

for(var proc in keywordDict){
var count=0;
keywordDict[proc].forEach(function(kw){
if(t.indexOf(kw)!==-1)count++;
});
if(count>bestMatch.count){
bestMatch={procedure:proc,count:count};
}
}

buttons.forEach(function(btn){
var name=btn.querySelector('strong').textContent;
if(bestMatch.procedure&&bestMatch.count>0&&name===bestMatch.procedure){
btn.classList.add('highlighted');
btn.classList.remove('dimmed');
}else{
btn.classList.remove('highlighted');
btn.classList.add('dimmed');
}
});

if(bestMatch.procedure&&bestMatch.count>0){
result.className='mail-result show success';
result.innerHTML='✅ <strong>'+bestMatch.procedure+'</strong> が該当しました。ボタンをクリックして手続きを開始してください。';
}else{
result.className='mail-result show info';
result.textContent='🔍 該当する手続きが見つかりませんでした。手動で選択してください。';
buttons.forEach(function(btn){btn.classList.remove('highlighted','dimmed');});
}
});

// CSV読み込み機能
var csvLoadBtn=document.getElementById('csvLoadBtn');
var csvFileInput=document.getElementById('csvFileInput');
var csvStatus=document.getElementById('csvStatus');
var progressTableWrap=document.getElementById('progressTableWrap');
var progressTableBody=document.getElementById('progressTableBody');
var csvEmpty=document.getElementById('csvEmpty');

csvLoadBtn.addEventListener('click',function(){
csvFileInput.click();
});

csvFileInput.addEventListener('change',function(e){
var files=e.target.files;
if(!files.length)return;

csvStatus.textContent='読み込み中...';
progressTableBody.innerHTML='';
var loadedCount=0;

Array.from(files).forEach(function(file){
var reader=new FileReader();
reader.onload=function(evt){
var csv=evt.target.result;
var rows=parseCSV(csv);

console.log('CSV parsed rows:',rows);
console.log('Headers:',rows[0]);

// ヘッダー行をスキップしてデータ行を処理
var headers=rows[0];
for(var i=1;i<rows.length;i++){
if(rows[i].length>=3){
console.log('Row',i,':',rows[i]);
var tr=createProgressRow(rows[i],headers);
progressTableBody.appendChild(tr);
}
}
loadedCount++;
if(loadedCount===files.length){
csvStatus.textContent=files.length+'件のファイルを読み込みました';
progressTableWrap.style.display='block';
csvEmpty.style.display='none';
}
};
reader.readAsText(file,'UTF-8');
});
});

function parseCSV(text){
// BOMを除去
text=text.replace(/^\uFEFF/,'');
// タブ区切りの検出
var lines=text.split(/\r?\n/);
var result=[];
lines.forEach(function(line){
if(line.trim()){
// タブ区切りを優先、なければカンマ区切り
var row;
if(line.indexOf('\t')!==-1){
row=line.split('\t').map(function(c){return c.trim();});
}else{
row=line.split(',').map(function(c){return c.trim();});
}
result.push(row);
}
});
return result;
}

function findHeaderIndex(headers,name){
// 完全一致、部分一致、大文字小文字を考慮した検索
for(var i=0;i<headers.length;i++){
var h=headers[i].toLowerCase().replace(/[\s_]/g,'');
var n=name.toLowerCase().replace(/[\s_]/g,'');
if(h===n||h.indexOf(n)!==-1||n.indexOf(h)!==-1)return i;
}
return -1;
}

function createProgressRow(data,headers){
var tr=document.createElement('tr');

// ヘッダーから各カラムのインデックスを検索
var idxReport=findHeaderIndex(headers,'報告区分');
var idxNo=findHeaderIndex(headers,'起案番号');
var idxDate=findHeaderIndex(headers,'起案日');
var idxPerson=findHeaderIndex(headers,'担当者');
var idxStatus=findHeaderIndex(headers,'ステータス');
var idxPubDate=findHeaderIndex(headers,'公表日');
var idxTitle=findHeaderIndex(headers,'研究課題名');
var idxManager=findHeaderIndex(headers,'研究責任者');

var report=idxReport>=0?(data[idxReport]||''):'';
var no=idxNo>=0?(data[idxNo]||''):'';
var date=idxDate>=0?(data[idxDate]||''):'';
var person=idxPerson>=0?(data[idxPerson]||''):'';
var status=idxStatus>=0?(data[idxStatus]||''):'';
var pubDate=idxPubDate>=0?(data[idxPubDate]||''):'';
var title=idxTitle>=0?(data[idxTitle]||''):'';
var manager=idxManager>=0?(data[idxManager]||''):'';

var statusClass=getStatusClass(status);
var progress=getProgressPercent(status);

tr.innerHTML='<td>'+report+'</td>'+
'<td>'+no+'</td>'+
'<td>'+date+'</td>'+
'<td>'+person+'</td>'+
'<td><span class="status-badge '+statusClass+'">'+status+'</span></td>'+
'<td><div class="progress-bar"><div class="progress-bar-fill '+statusClass+'" style="width:'+progress+'%"></div></div></td>'+
'<td>'+pubDate+'</td>'+
'<td>'+title+'</td>'+
'<td>'+manager+'</td>';
return tr;
}

function getStatusClass(status){
if(!status)return 'not-started';
if(status==='起案中')return 'drafting';
if(status==='進行中')return 'in-progress';
if(status==='完了'||status==='送信済')return 'completed';
return 'not-started';
}

function getProgressPercent(status){
if(!status)return 0;
if(status==='起案中')return 33;
if(status==='進行中')return 66;
if(status==='完了'||status==='送信済')return 100;
return 0;
}
