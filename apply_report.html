function h(str){return String(str||'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));}
function getValue(id){const el=document.getElementById(id);return el?el.value.trim():(state[id]??'').toString().trim();}

    if(sel && sel.value!=='__free') return;
    state[el.dataset.presetFree]=el.value;
  });
}

function incrementLastBranch(no, keepLast=false){
  const val = String(no || '').trim();
  if(!val) return '';
  const m = val.match(/^(.*[_-])(\d+)-(\d+)$/);
  if(m){
    const prefix = m[1], first = m[2], last = parseInt(m[3],10);
    return `${prefix}${first}-${keepLast ? last : last+1}`;
  }
  const m2 = val.match(/^(.*[_-])(\d+)$/);
  if(m2){
    const prefix = m2[1], last = parseInt(m2[2],10);
    return prefix + String(keepLast ? last : last+1);
  }
  return val;
}

function requestRowsData(){

    ? state.requestRows

}

  if(!state.requestRows || !state.requestRows.length)
    state.requestRows=[{type:'初回公表',base:'特2025-17_2-1',date:'',url:''}];
  if(!state.requestRows[idx]) state.requestRows[idx]={type:'初回公表',base:'特2025-17_2-1',date:'',url:'',facilityType:'',facilityDetail:''};
  state.requestRows[idx][key]=val;
}
function requestOutputNo(r){
  return incrementLastBranch(r.base || '特2025-17_2-1', r.type==='軽微変更') || (r.base || '特2025-17_2-1');
}

function branchSuffix(no){
  const s=String(no||'').trim();
  const matches=[...s.matchAll(/(\d{4})[-_]/g)];
  for(let k=matches.length-1;k>=0;k--){
    const m=matches[k];
    const before=s[m.index-1];
    const tail=s.substring(m.index+m[0].length);
    if(/[_-\d]/.test(before??'')&&/\d/.test(tail)){
      const yearEnd=m.index+m[1].length;
      return s.substring(yearEnd+1);
    }
  }
  const i=s.lastIndexOf('_');
  return i>=0?s.substring(i+1):s;
}

function datePrefix(){
  const d=new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_`;
}
function todayYmd(){
  const d=new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function todayFormatted(){
  const d=new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function normalizeToYmdSlash(v){
  const s=String(v||'').trim();
  if(!s) return '';
  const m=s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if(m) return `${m[1]}/${m[2].padStart(2,'0')}/${m[3].padStart(2,'0')}`;
  const m2=s.match(/^(\d{4})(\d{2})(\d{2})$/);
  if(m2) return `${m2[1]}/${m2[2]}/${m2[3]}`;
  return s;
}

function combinedDraftReportPrefix(){
  const rows=requestRowsData();
  if(rows.length<=1) return requestOutputNo(rows[0]||{type:'初回公表',base:'特2025-17_2-1'});
  const first=requestOutputNo(rows[0]);
  const matches=[...first.matchAll(/(\d{4})[-_]/g)];
  let basePrefix=first.substring(0,first.lastIndexOf('_'));
  for(let k=matches.length-1;k>=0;k--){
    const m=matches[k];
    const before=first[m.index-1];
    const tail=first.substring(m.index+m[0].length);
    if(/[_-\d]/.test(before??'')&&/\d/.test(tail)){
      basePrefix=first.substring(0,m.index+m[0].length-1);
      break;
    }
  }
  const branches=rows.map(r=>branchSuffix(requestOutputNo(r)));
  const compact=branches.map((s,i)=>{
    if(i===0) return s;
    return s.replace(/^\d{4}[-_]/,'');
  });
  return basePrefix+'_'+compact.join('_');
}

function outputCategory(type){
  const map = {
    '軽微変更': '申請',
    '変更': '申請',
    '定期報告': '定期報告',
    '一部公表': '申請',
    '初回公表': '申請',
    '不適合報告': '不適合',
    '疾病等報告（医療機器）': '医療機器'
  };
  return map[type] || type;
}

function rowFromLedger(r){
  return {
    type:r['報告区分']||'初回公表',
    base:r['元の起案番号']||r['起案番号']||'特2025-17_2-1',
    date:r['公表日']||r['報告期間']||'',
    url:r['jRCT URL']||'',
    facilityType:r['自施設他施設']||'',
    facilityDetail:r['報告詳細']||''
  };
}
function selectedLedgerRows(){
  const idxs=(state.selectedLedgerIndexes||[]).filter(i=>state.loadedLedgerRows[i]);
  return idxs.map(i=>state.loadedLedgerRows[i]);
}
function syncRequestRowsFromSelectedLedger(){
  const rows=selectedLedgerRows();
  if(rows.length){
    state.requestRows=rows.map(rowFromLedger);
    state.managerPaths=rows.map(r=>r['管理者側フォルダパス']||'');
    const first=rows[0];
    if(first['研究課題名']) state.studyTitle=first['研究課題名'];
    if(first['担当者']) state.drafterName=first['担当者'];
    if(first['所属・部門名']) state.drafterDept=first['所属・部門名'];
    if(first['研究略称']) state.mailSubject=first['研究略称'];
    if(first['jRCT番号']) state.jrctNo=first['jRCT番号'];
    const studyCat=first['研究区分']||'';
    state.studyTypeNonspecific=studyCat.includes('非特定');
    state.studyTypeSpecific=studyCat.includes('特定') && !studyCat.startsWith('非特定');
    const subCat=first['サブ分類']||'';
    state.studyTypeUnapproved=subCat.includes('未承認適応外');
    state.studyTypeFunding=subCat.includes('資金提供');
    if(first['研究責任者1氏名']) state.managerName1=first['研究責任者1氏名'];

function namingRulesForRow(r){
  const category = r?.type || '初回公表';
  const items = NAMING_MASTER.filter(x => x.category === category);
  const prefix = String(requestOutputNo(r) || '').trim();

  if(!items.length){
    return {
      category,
      html:'<div class="help">この公表区分の命名規則はまだ未登録です。</div>',
      requiredCount:0
    };
  }

  const seqLabel = v => {
    const n = String(v || '').trim();
    const m = n.match(/^(\d+)(?:\.\d+)?$/);
    return m ? m[1].padStart(2, '0') : n;
  };

  const html = items.map((it, idx) => {
    const parts = [...it.pattern];
    if(parts.length >= 3){
      parts[2] = seqLabel(parts[2]);
    }
    const filename = [prefix, ...parts.slice(1)].join('_') + '.' + (it.ext || 'pdf');

    return `
      <div class="template-card">
        <h4>${idx + 1}. ${h(it.source)}</h4>
        <div class="mono">
必須：${it.required ? 'はい' : '状況により'}（${h(category)}）
想定ファイル名：
${h(filename)}
        </div>
        <div style="margin-top:.4rem;display:flex;gap:.4rem;flex-wrap:wrap;">
          <button type="button" class="ghost-btn" data-copy-filename data-filename="${h(filename.replace(/\.[^.]+$/,''))}">ファイル名をコピー</button>
          <label class="row-pick" style="padding:.3rem .5rem;">
            <input type="checkbox" data-file-attached="${idx}">
            <span class="small">NASに添付済み</span>
          </label>
        </div>
      </div>
    `;
  }).join('');

  return {
    category,
    html,
    requiredCount: items.filter(x => x.required).length
  };
}

function copyToClipboard(text){
  if(navigator.clipboard&&window.isSecureContext){
    return navigator.clipboard.writeText(text);
  }
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  return Promise.resolve();
}

function parseCsvRobust(text){
  const clean=String(text||'').replace(/^\uFEFF/,'');
  const out=[];let row=[],cell='',inQ=false;
  for(let i=0;i<clean.length;i++){
    const ch=clean[i];
    if(ch==='\"'){
      if(inQ && clean[i+1]==='\"'){cell+='\"';i++;}
      else inQ=!inQ;
    }else if(ch===',' && !inQ){
      row.push(cell);cell='';
    }else if((ch==='\n'||ch==='\r') && !inQ){
      if(ch==='\r' && clean[i+1]==='\n') i++;
      row.push(cell);out.push(row);row=[];cell='';
    }else cell+=ch;
  }
  if(cell.length||row.length){row.push(cell);out.push(row);}
  const lines=out.filter(r=>r.some(v=>String(v).trim()!==''));
  if(!lines.length) return {headers:[],rows:[]};
  const headers=lines[0].map(v=>String(v).trim());
  const rows=lines.slice(1).map(cols=>{
    const obj={};headers.forEach((h,i)=>obj[h]=cols[i]??'');return obj;
  });
  return {headers,rows};
}

function handleCsvLoadFromFile(ev){
  const file=ev.target.files && ev.target.files[0];
  if(!file){fileStatuses.csv='ファイルが選択されていません。';renderTemplate();return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=parseCsvRobust(String(e.target.result||''));
      if(!parsed.rows.length){fileStatuses.csv='CSVに有効な行がありません。';renderTemplate();return;}
      state.requestRows=parsed.rows.map(r=>({
        type:r['報告区分']||'初回公表',
        base:r['元の起案番号']||r['起案番号']||'特2025-17_2-1',
        date:r['公表日']||r['報告期間']||'',
        url:r['jRCT URL']||'',
        facilityType:r['自施設他施設']||'',
        facilityDetail:r['報告詳細']||''
      }));
      const first=parsed.rows[0];
      if(first['研究課題名']) state.studyTitle=first['研究課題名'];
      if(first['担当者']) state.drafterName=first['担当者'];
      if(first['所属・部門名']) state.drafterDept=first['所属・部門名'];
      if(first['研究略称']) state.mailSubject=first['研究略称'];
      if(first['jRCT番号']) state.jrctNo=first['jRCT番号'];
      const studyCat=first['研究区分']||'';
      state.studyTypeNonspecific=studyCat.includes('非特定');
      state.studyTypeSpecific=studyCat.includes('特定') && !studyCat.startsWith('非特定');
      const subCat=first['サブ分類']||'';
      state.studyTypeUnapproved=subCat.includes('未承認適応外');
      state.studyTypeFunding=subCat.includes('資金提供');
      if(first['研究責任者1氏名']) state.managerName1=first['研究責任者1氏名'];
      else if(first['研究責任者']) state.managerName1=first['研究責任者'];
      if(first['研究責任者1所属']) state.managerAffil1=first['研究責任者1所属'];
      if(first['研究責任者1部署']) state.managerDept1=first['研究責任者1部署'];
      if(first['研究責任者1職名']) state.managerTitle1=first['研究責任者1職名'];
      if(first['研究責任者2氏名']) state.managerName2=first['研究責任者2氏名'];
      if(first['研究責任者2所属']) state.managerAffil2=first['研究責任者2所属'];
      if(first['研究責任者2部署']) state.managerDept2=first['研究責任者2部署'];
    if(first['研究責任者2職名']) state.managerTitle2=first['研究責任者2職名'];
    if(first['起案日']) state.draftDate=normalizeToYmdSlash(first['起案日']);
      if(first['管理者報告メール送信日']) state.sendDate=first['管理者報告メール送信日'];
      if(first['起案日']) state.draftDate=normalizeToYmdSlash(first['起案日']);
      state.managerPaths=parsed.rows.map(r=>r['管理者側フォルダパス']||'');
      const cnt=parsed.rows.length;
      const msg='\u2705 '+cnt+'件の依頼行を読み込み、研究課題情報・研究責任者・研究区分を復元しました。';
      fileStatuses.csv=msg;
      const s1=document.getElementById('csvStatusStep1');
      if(s1){s1.textContent=msg;s1.style.color='var(--success)';}
      renderAll();
    }catch(err){fileStatuses.csv='CSV読み込みに失敗しました：'+err.message;renderTemplate();}
  };
  reader.readAsText(file);
}
function handleLedgerLoadForBack(ev){
  const file=ev.target.files && ev.target.files[0];
  if(!file){fileStatuses.csvStep5='ファイルが選択されていません。';renderTemplate();return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=parseCsvRobust(String(e.target.result||''));
      if(!parsed.rows.length){fileStatuses.csvStep5='CSVに有効な行がありません。';renderTemplate();return;}
      state.loadedLedgerHeaders=parsed.headers;
      state.loadedLedgerRows=parsed.rows;
      state.selectedLedgerIndexes=parsed.rows.map((_,i)=>i);
      state.managerPaths=parsed.rows.map(r=>r['管理者側フォルダパス']||'');
      syncRequestRowsFromSelectedLedger();
      fileStatuses.csvStep5='✅ 台帳CSVを読み込みました。対象行を選択してください。';
      renderAll();
    }catch(err){fileStatuses.csvStep5='CSV読み込みに失敗しました：'+err.message;renderTemplate();}
  };
  reader.readAsText(file);
}
function toggleLedgerRowSelection(idx,checked){
  const set=new Set(state.selectedLedgerIndexes||[]);
  if(checked) set.add(idx);
  else set.delete(idx);
  state.selectedLedgerIndexes=[...set].sort((a,b)=>a-b);
  syncRequestRowsFromSelectedLedger();
}
function selectAllLedgerRows(){
  state.selectedLedgerIndexes=state.loadedLedgerRows.map((_,i)=>i);
  syncRequestRowsFromSelectedLedger();
  renderAll();
}
function clearLedgerRowSelection(){
  state.selectedLedgerIndexes=[];
  state.requestRows=[{type:'初回公表',base:'特2025-17_2-1',date:'',url:'',facilityType:'',facilityDetail:''}];
  renderAll();
}
function ledgerCsvForDownload(){
  const headers=state.loadedLedgerHeaders.length
    ? [...state.loadedLedgerHeaders]
    : ['起案日','起案番号','報告区分','担当者','ステータス','公表日','jRCT URL','元の起案番号','研究課題名','研究責任者'];
  if(!headers.includes('起案日')) headers.unshift('起案日');
  if(!headers.includes('研究課題名')) headers.push('研究課題名');
  if(!headers.includes('研究責任者')) headers.push('研究責任者');
  if(!headers.includes('ステータス')) headers.push('ステータス');
  if(!headers.includes('管理者報告メール送信日')) headers.push('管理者報告メール送信日');
  if(!headers.includes('管理者側フォルダパス')) headers.push('管理者側フォルダパス');
  if(!headers.includes('元の起案番号')) headers.push('元の起案番号');
  if(!headers.includes('担当者')) headers.push('担当者');
  if(!headers.includes('研究区分')) headers.push('研究区分');
  if(!headers.includes('サブ分類')) headers.push('サブ分類');
  if(!headers.includes('研究略称')) headers.push('研究略称');
  if(!headers.includes('研究責任者1所属')) headers.push('研究責任者1所属');
  if(!headers.includes('研究責任者1部署')) headers.push('研究責任者1部署');
  if(!headers.includes('研究責任者1職名')) headers.push('研究責任者1職名');
  if(!headers.includes('研究責任者1氏名')) headers.push('研究責任者1氏名');
  if(!headers.includes('研究責任者2氏名')) headers.push('研究責任者2氏名');
  if(!headers.includes('研究責任者2所属')) headers.push('研究責任者2所属');
  if(!headers.includes('研究責任者2部署')) headers.push('研究責任者2部署');
  if(!headers.includes('研究責任者2職名')) headers.push('研究責任者2職名');
  if(!headers.includes('jRCT番号')) headers.push('jRCT番号');
  if(!headers.includes('所属・部門名')) headers.push('所属・部門名');
  if(!headers.includes('公表日')) headers.push('公表日');
  if(!headers.includes('報告期間')) headers.push('報告期間');
  if(!headers.includes('自施設他施設')) headers.push('自施設他施設');
  if(!headers.includes('報告詳細')) headers.push('報告詳細');
  if(!headers.includes('step1(秒)')) headers.push('step1(秒)');
  if(!headers.includes('step2(秒)')) headers.push('step2(秒)');
  if(!headers.includes('step3(秒)')) headers.push('step3(秒)');
  if(!headers.includes('step4(秒)')) headers.push('step4(秒)');
  if(!headers.includes('step5(秒)')) headers.push('step5(秒)');
  if(!headers.includes('step6(秒)')) headers.push('step6(秒)');
  if(!headers.includes('step7(秒)')) headers.push('step7(秒)');

  const sendDate=getValue('sendDate')||'';
  const draftDate=state.draftDate||todayFormatted();
  const paths=state.managerPaths||[];
  const studyTitle=getValue('studyTitle')||'';
  const managerName=buildManagerDisplay()||'';
  const drafter=getValue('drafterName')||'';
  const mailSubject=getValue('mailSubject')||'';
  const studyTypeSpecific=!!state.studyTypeSpecific;
  const studyTypeNonspecific=!!state.studyTypeNonspecific;
  const studyTypeUnapproved=!!state.studyTypeUnapproved;
  const studyTypeFunding=!!state.studyTypeFunding;
  const studyTypeParts=[];
  if(studyTypeSpecific) studyTypeParts.push('特定');
  if(studyTypeNonspecific) studyTypeParts.push('非特定');
  const studyCategory=studyTypeParts.join('・');
  const subParts=[];
  if(studyTypeUnapproved) subParts.push('未承認適応外');
  if(studyTypeFunding) subParts.push('資金提供');
  const subCategory=subParts.join('・');
  const targetIndexes=new Set((state.selectedLedgerIndexes||[]));
  const hasLoaded=state.loadedLedgerRows.length>0;

  const baseRows=hasLoaded ? state.loadedLedgerRows.map(r=>({...r})) : requestRowsData().map(r=>({
    '起案番号':requestOutputNo(r),
    '報告区分':r.type,
    '公表日':r.type==='定期報告'?'':r.date||'',
    '報告期間':r.type==='定期報告'?r.date||'':'',
    'jRCT URL':r.url||'',
    '元の起案番号':r.base||'',
    '研究課題名':studyTitle,
    '研究責任者':managerName
  }));
  if(hasLoaded){
    baseRows.forEach(r=>{
      const type=r['報告区分']||'';
      if(type==='定期報告'){
        if(!r['報告期間']&&r['公表日']){r['報告期間']=r['公表日'];r['公表日']='';}
      }else{
        if(!r['公表日']&&r['報告期間']){r['公表日']=r['報告期間'];r['報告期間']='';}
      }
    });
  }

  const rows=baseRows.map((r,idx)=>{
    const obj={...r};
    if(!obj['起案日']) obj['起案日']=draftDate;
    if(!obj['研究課題名']) obj['研究課題名']=studyTitle;
    if(!obj['研究責任者']) obj['研究責任者']=managerName;
    if(!obj['担当者']) obj['担当者']=drafter;
    if(!obj['研究区分']) obj['研究区分']=studyCategory;
    if(!obj['サブ分類']) obj['サブ分類']=subCategory;
    if(!obj['研究略称']) obj['研究略称']=mailSubject;
    if(!obj['研究責任者1氏名']) obj['研究責任者1氏名']=getValue('managerName1')||'';
    if(!obj['研究責任者1所属']) obj['研究責任者1所属']=getValue('managerAffil1')||'';
    if(!obj['研究責任者1部署']) obj['研究責任者1部署']=getValue('managerDept1')||'';
    if(!obj['研究責任者1職名']) obj['研究責任者1職名']=getValue('managerTitle1')||'';
    if(!obj['研究責任者2氏名']) obj['研究責任者2氏名']=getValue('managerName2')||'';
    if(!obj['研究責任者2所属']) obj['研究責任者2所属']=getValue('managerAffil2')||'';
    if(!obj['研究責任者2部署']) obj['研究責任者2部署']=getValue('managerDept2')||'';
    if(!obj['研究責任者2職名']) obj['研究責任者2職名']=getValue('managerTitle2')||'';
    if(!obj['jRCT番号']) obj['jRCT番号']=getValue('jrctNo')||'';
    if(!obj['所属・部門名']) obj['所属・部門名']=getValue('drafterDept')||'';
    if(!hasLoaded || targetIndexes.has(idx)){
      obj['ステータス']='送信済';
      obj['管理者報告メール送信日']=sendDate;
      obj['管理者側フォルダパス']=paths[idx]||'';
      if(!obj['元の起案番号']) obj['元の起案番号']=obj['起案番号'] || '';
    }
    obj['step1(秒)']=state.stepDurations['intake']||0;
    obj['step2(秒)']=state.stepDurations['folders']||0;
    obj['step3(秒)']=state.stepDurations['drafts']||0;
    obj['step4(秒)']=state.stepDurations['files']||0;
    obj['step5(秒)']=state.stepDurations['work']||0;
    obj['step6(秒)']=state.stepDurations['path']||0;
    obj['step7(秒)']=state.stepDurations['send']||0;
    if(!obj['自施設他施設']) obj['自施設他施設'] = requestRowsData()[idx]?.facilityType || '';
    if(!obj['報告詳細']) obj['報告詳細'] = requestRowsData()[idx]?.facilityDetail || '';
    return obj;
  });
  const body=rows.map(r=>headers.map(hd=>csvEscape(r[hd]||'')).join(',')).join('\n');
  return headers.map(csvEscape).join(',')+'\n'+body;
}
function downloadUpdatedLedgerCsv(){
  const csv=ledgerCsvForDownload();
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=datePrefix()+combinedDraftReportPrefix()+'_管理者申請_進捗台帳_更新済み.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  fileStatuses.csvStep7='✅ 更新済み台帳CSVをダウンロードしました。';
  renderTemplate();
}

function handleReportTemplateDocxLoad(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file){
    fileStatuses.reportDocx='ファイルが選択されていません。';
    const el=document.getElementById('reportDocxTemplateStatus');if(el) el.textContent=fileStatuses.reportDocx;
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    reportTemplateDocxBuffer = e.target.result;
    reportTemplateDocxName = file.name || '報告案テンプレート.docx';
    fileStatuses.reportDocx=`✅ ひな形（${reportTemplateDocxName}）を読み込みました。`;
    const el=document.getElementById('reportDocxTemplateStatus');if(el) el.textContent=fileStatuses.reportDocx;
  };
  reader.onerror = () => {
    fileStatuses.reportDocx='テンプレート読込に失敗しました。';
    const el=document.getElementById('reportDocxTemplateStatus');if(el) el.textContent=fileStatuses.reportDocx;
  };
  reader.readAsArrayBuffer(file);
}

function mark(flag){
  return flag ? '■' : '☐';
}

function safeDocxText(v){
  return String(v ?? '').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
}

function formatDateToJapanese(v){
  const s=String(v||'').trim();
  if(!s) return '';
  const m=s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if(!m) return s;
  return `${m[1]}年${m[2].padStart(2,'0')}月${m[3].padStart(2,'0')}日`;
}
function formatDateRangeToJapanese(v){
  const s=String(v||'').trim();
  if(!s) return '';
  const parts=s.split('～').map(x=>x.trim());
  if(parts.length>=2){
    return parts.map(p=>formatDateToJapanese(p)).join('～');
  }
  return formatDateToJapanese(s);
}
function formatDateRangeToSlash(v){
  const s=String(v||'').trim();
  if(!s) return '';
  const parts=s.split('～').map(x=>x.trim());
  if(parts.length>=2){
    return parts.map(p=>{
      const m=p.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
      return m ? `${m[1]}/${m[2].padStart(2,'0')}/${m[3].padStart(2,'0')}` : p;
    }).join('～');
  }
  const m=s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  return m ? `${m[1]}/${m[2].padStart(2,'0')}/${m[3].padStart(2,'0')}` : s;
}

function joinDocxLines(values){
  return safeDocxText(
    values
      .map(v => String(v ?? '').trim())
      .filter(v => v !== '')
      .join('\n')
  );
}

function fullWidthWidth(str){
  let w=0;
  for(const ch of String(str)){
    const c=ch.codePointAt(0);
    if(c<=0x7F) w+=1;
    else if(c<=0x2E7F) w+=1;
    else if(c<=0x9FFF) w+=2;
    else if(c<=0xF9FF) w+=2;
    else if(c<=0xFEFF) w+=1;
    else if(c<=0x1FFFF) w+=2;
    else w+=1;
  }
  return w;
}

function padFullWidth(str, targetWidth){
  const cur=fullWidthWidth(str);
  if(cur>=targetWidth) return str;
  return str + '　'.repeat(targetWidth-cur);
}

function alignedDocxLines(types, values){
  const pairs=types.map((t,i)=>[String(t||'').trim(), String(values[i]||'').trim()]).filter(([t,v])=>t||v);
  if(!pairs.length) return '';
  const maxW=Math.max(...pairs.map(([t])=>fullWidthWidth(t)));
  return pairs.map(([t,v])=>`${padFullWidth(t,maxW)}\t${v}`).join('\n');
}

function currentDocxDateParts(){
  const src=state.draftDate||todayFormatted();
  const m=String(src).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m){
    return{year:m[1],month:m[2].padStart(2,'0'),day:m[3].padStart(2,'0')};
  }
  const now=new Date();
  return{year:String(now.getFullYear()),month:String(now.getMonth()+1).padStart(2,'0'),day:String(now.getDate()).padStart(2,'0')};
}

function ensureDocxLibReady(){
  return typeof window.PizZip !== 'undefined' && typeof window.docxtemplater !== 'undefined';
}

function escapeRegex(str){
  return String(str).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function preprocessDocxForConditionals(buffer, data){
  const zip = new PizZip(buffer);
  const xmlPaths = Object.keys(zip.files).filter(f=>
    /^word\/(document|header|footer)\d*\.xml$/.test(f)
  );
  const emptyKeys = Object.entries(data)
    .filter(([k,v])=>v===''||v===null||v===undefined)
    .map(([k])=>k);
  emptyKeys.forEach(k => { data[k] = null; });
  if(!emptyKeys.length) return buffer;

  function isInsideWT(xml, pos){
    const ltOpen=xml.lastIndexOf('<w:t',pos);
    if(ltOpen===-1) return false;
    const ltTagClose=xml.indexOf('>',ltOpen);
    if(ltTagClose===-1||pos<ltTagClose+1) return false;
    const ltEnd=xml.indexOf('</w:t>',ltTagClose);
    if(ltEnd===-1) return false;
    return pos<ltEnd;
  }

  const editsPerFile={};
  xmlPaths.forEach(path=>{
    const xml=zip.file(path).asText();
    const inserts=[];
    for(const key of emptyKeys){
      const tag=`{{${key}}}`;
      let pos=0;
      while(pos<xml.length){
        const tagIdx=xml.indexOf(tag,pos);
        if(tagIdx===-1) break;
        pos=tagIdx+tag.length;

        const pOpen=xml.lastIndexOf('<w:p',tagIdx);
        const pClose=xml.indexOf('</w:p>',tagIdx);
        if(pOpen===-1||pClose===-1) continue;

        let leftParenIdx=-1;
        for(let i=tagIdx-1;i>=pOpen;i--){
          if(xml[i]==='\uFF09') break;
          if(xml[i]==='\uFF08'){leftParenIdx=i;break;}
        }
        let rightParenIdx=-1;
        for(let i=tagIdx+tag.length;i<pClose+6;i++){
          if(xml[i]==='\uFF08') break;
          if(xml[i]==='\uFF09'){rightParenIdx=i;break;}
        }

        if(leftParenIdx!==-1 && isInsideWT(xml,leftParenIdx) &&
           rightParenIdx!==-1 && isInsideWT(xml,rightParenIdx)){
          inserts.push({pos:leftParenIdx, text:`{{#${key}}}`});
          inserts.push({pos:rightParenIdx+1, text:`{{/${key}}}`});
        }else{
          const tOpen=xml.lastIndexOf('<w:t',tagIdx);
          const tClose=xml.indexOf('>',tOpen);
          const tEnd=xml.indexOf('</w:t>',tagIdx);
          if(tOpen!==-1&&tClose!==-1&&tEnd!==-1){
            inserts.push({pos:tClose+1, text:`{{#${key}}}`});
            inserts.push({pos:tEnd, text:`{{/${key}}}`});
          }
        }
      }
    }
    if(inserts.length) editsPerFile[path]=inserts;
  });

  if(!Object.keys(editsPerFile).length) return buffer;

  xmlPaths.forEach(path=>{
    const inserts=editsPerFile[path];
    if(!inserts||!inserts.length) return;
    let xml=zip.file(path).asText();
    inserts.sort((a,b)=>b.pos-a.pos);
    for(const ins of inserts){
      xml=xml.substring(0,ins.pos)+ins.text+xml.substring(ins.pos);
    }
    zip.file(path,xml);
  });

  return zip.generate({type:'uint8array'});
}

function renderDocxFromTemplate(buffer, data){
  try{
    const processed = preprocessDocxForConditionals(buffer, data);
    const zip = new PizZip(processed);
    const doc = new window.docxtemplater(zip, {
      delimiters:{start:'{{', end:'}}'},
      paragraphLoop:true,
      linebreaks:true,
      nullGetter:function(){return '';}
    });
    doc.render(data);
    return doc.getZip().generate({
      type:'blob',
      mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
  }catch(e){
    console.error('docx rendering failed, trying without preprocess:', e);
    const zip = new PizZip(buffer);
    const doc = new window.docxtemplater(zip, {
      delimiters:{start:'{{', end:'}}'},
      paragraphLoop:true,
      linebreaks:true,
      nullGetter:function(){return '';}
    });
    doc.render(data);
    return doc.getZip().generate({
      type:'blob',
      mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
  }
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function generateJrctUrlXlsx(allRows){
  if(typeof XLSX==='undefined') return null;
  const findRowOfType = (t) => allRows.find(x => x?.type === t) || null;
  const pairs = [
    ['初回公表', findRowOfType('初回公表')],
    ['変更', findRowOfType('変更')],
    ['軽微変更', findRowOfType('軽微変更')]
  ].filter(([_,row]) => row);
  if(!pairs.length) return null;
  const wb = XLSX.utils.book_new();
  const header = ['jRCT種別','公表日','jRCT URL','管理番号'];
  const data = [header];
  pairs.forEach(([type, row]) => data.push([type, row.date||'', row.url||'', requestOutputNo(row)]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:14},{wch:14},{wch:50},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws, 'jRCT URL');
  const buf = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  return new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
}

function jRCTUrlFileName(r){
  const naming = NAMING_MASTER.find(x => x.source === 'jRCT_URL');
  if(!naming) return null;
  const prefix = requestOutputNo(r);
  const seqLabel = v => {
    const n = String(v||'').trim();
    const m = n.match(/^(\d+)(?:\.\d+)?$/);
    return m ? m[1].padStart(2,'0') : n;
  };
  const parts = [...naming.pattern];
  if(parts.length >= 3) parts[2] = seqLabel(parts[2]);
  return [prefix, ...parts.slice(1)].join('_') + '.xlsx';
}

function parseJRCTHtml(input){
  const data={};
  let text='';
  if(input.includes('<th')||input.includes('<td')){
    const parser=new DOMParser();
    const doc=parser.parseFromString(input,'text/html');
    text=doc.body?.innerText||input;
  }else{
    text=input;
  }
  const lines=text.split('\n').map(s=>s.replace(/\r/g,'').trim()).filter(Boolean);
  const SKIP=/^(Name|氏名|\/|Affiliation|所属|Address|住所|Phone|電話|FAX|Email|電子メール|Plan|計画|e-Rad|〒|（個人|（組織|（施設|（多|Data|Patient|Among|Patholog|EGFR|Grade|Any|Thrombo|One|In |A |The |Although|Recurrence|Although|Result|Baseline|Participant|Brief|No|Phase)/i;
  function isValue(v,label){
    if(!v||v.length<2) return false;
    if(label&&v.includes(label)) return false;
    if(SKIP.test(v)) return false;
    return true;
  }
  function findVal(label){
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      if(!line.includes(label)) continue;
      const parts=line.split('\t');
      if(parts.length>=2){
        for(let k=0;k<parts.length;k++){
          if(parts[k].trim().includes(label)){
            for(let p=k+1;p<parts.length;p++){
              const v=parts[p].trim();
              if(isValue(v,label)) return v;
            }
          }
        }
      }
      for(let j=i+1;j<Math.min(i+4,lines.length);j++){
        const v=lines[j].split('\t')[0].trim();
        if(isValue(v,label)) return v;
      }
    }
    return '';
  }
  function findAllVal(label){
    const results=[];
    let found=false;
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      if(!line.includes(label)) continue;
      found=false;
      const parts=line.split('\t');
      if(parts.length>=2){
        for(let k=0;k<parts.length;k++){
          if(parts[k].trim().includes(label)){
            for(let p=k+1;p<parts.length;p++){
              const v=parts[p].trim();
              if(isValue(v,label)){results.push(v);found=true;break;}
            }
            break;
          }
        }
      }
      if(!found){
        for(let j=i+1;j<Math.min(i+4,lines.length);j++){
          const v=lines[j].split('\t')[0].trim();
          if(isValue(v,label)){results.push(v);break;}
        }
      }
    }
    return results;
  }
  data.mailSubject=findVal('平易な研究名称')||findVal('Public Title');
  data.studyTitle=findVal('研究名称')||findVal('Scientific Title');
  data.managerName1=(findVal('統括管理者の氏名')||'').replace(/\s{2,}/g,' ').replace(/^[\s\u3000]+|[\s\u3000]+$/g,'');
  data.managerAffil1=findVal('統括管理者の所属機関')||findVal('所属機関（実施医療機関）');
  const mgrDept=findVal('統括管理者の所属部署');
  if(mgrDept&&!mgrDept.includes('担当者')) data.managerDept1=mgrDept;
  const contactNames=findAllVal('担当者氏名');
  if(contactNames.length>0) data.managerName2=contactNames[0].replace(/\s{2,}/g,' ').replace(/^[\s\u3000]+|[\s\u3000]+$/g,'');
  data.managerAffil2=findVal('担当者所属機関');
  data.managerDept2=findVal('担当者所属部署');
  const jrctText=findVal('臨床研究実施計画番号')||findVal('jRCT番号');
  if(jrctText){const m=jrctText.match(/jRCT\w+/);if(m) data.jrctNo=m[0];}
  const fundingLines=findAllVal('研究資金等の提供の有無');
  data.isFunding=fundingLines.some(f=>f.includes('あり'));
  const researchType=findVal('研究の種別');
  data.isSpecific=!!(researchType&&researchType.includes('特定'));
  data.isNonspecific=!!(researchType&&researchType.includes('非特定'));
  const approvalStatus=findVal('医薬品医療機器等法における未承認、適応外、承認内の別');
  const unapprovedCheck=findVal('著しい負担を与える検査その他の行為において未承認又は適応外の医薬品等の使用の有無');
  data.isUnapproved=!!(
    (approvalStatus&&(approvalStatus.includes('未承認')||approvalStatus.includes('適応外')))||
    (unapprovedCheck&&unapprovedCheck.includes('あり'))
  );
  const pubDateText=findVal('最終公表日')||findVal('初回公表日');
  if(pubDateText){
    let m=pubDateText.match(/令和(\d+)年(\d+)月(\d+)日/);
    if(m){const y=2018+parseInt(m[1]);data.pubDate=y+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0');}
    else{m=pubDateText.match(/平成(\d+)年(\d+)月(\d+)日/);
    if(m){const y=1988+parseInt(m[1]);data.pubDate=y+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0');}
    else{m=pubDateText.match(/(\d{4})年(\d+)月(\d+)日/);if(m) data.pubDate=m[1]+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0');}}
  }
  data.jrctUrl='https://jrct.mhlw.go.jp/latest-detail/'+(data.jrctNo||'');
  return data;
}
function applyJRCTData(data){
  function setVal(id,val){
    if(!val) return;
    state[id]=val;
    const el=document.querySelector('[data-bind="'+id+'"]');
    if(!el) return;
    const s=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value').set;
    s.call(el,val);
    el.dispatchEvent(new Event('input',{bubbles:true}));
    el.dispatchEvent(new Event('change',{bubbles:true}));
  }
  setVal('mailSubject',data.mailSubject);
  setVal('studyTitle',data.studyTitle);
  setVal('jrctNo',data.jrctNo);
  setVal('managerAffil1',data.managerAffil1);
  setVal('managerDept1',data.managerDept1);
  setVal('managerTitle1',data.managerTitle1);
  setVal('managerName1',data.managerName1);
  setVal('managerAffil2',data.managerAffil2);
  setVal('managerDept2',data.managerDept2);
  setVal('managerTitle2',data.managerTitle2);
  setVal('managerName2',data.managerName2);
  if(data.isSpecific){
    const el=document.getElementById('studyTypeSpecific');
    if(el&&!el.checked) el.click();
    const ns=document.getElementById('studyTypeNonspecific');
    if(ns&&ns.checked) ns.click();
    state.studyTypeNonspecific=false;
  }
  if(data.isNonspecific){
    const el=document.getElementById('studyTypeNonspecific');
    if(el&&!el.checked) el.click();
    const sp=document.getElementById('studyTypeSpecific');
    if(sp&&sp.checked) sp.click();
    state.studyTypeSpecific=false;
    state.studyTypeUnapproved=false;
    state.studyTypeFunding=false;
    const ua=document.getElementById('studyTypeUnapproved');
    if(ua&&ua.checked) ua.click();
    const fd=document.getElementById('studyTypeFunding');
    if(fd&&fd.checked) fd.click();
  }
  if(data.isUnapproved){const el=document.getElementById('studyTypeUnapproved');if(el&&!el.checked) el.click();}
  if(data.isFunding){const el=document.getElementById('studyTypeFunding');if(el&&!el.checked) el.click();}
  if(data.pubDate&&state.requestRows&&state.requestRows[0]){
    state.requestRows[0].date=data.pubDate;
  }
  if(data.jrctUrl&&state.requestRows&&state.requestRows[0]){
    state.requestRows[0].url=data.jrctUrl;
  }
  renderAll();
}

      'すべてのファイルを確認したら、チェックリストにチェックを入れて完了してください。'

  },
  work:{
    title:'CSCC側の作業を始めます',
    steps:[

      '読み込まれた行の中から、作業する対象の案件にチェックを入れます。',
      '選択した案件に対応するCSCC側フォルダが表示されます。必要書類を格納してください。'

  },
  path:{

    steps:[
      '管理者側の申請フォルダに書類を格納したら、そのフォルダのパスを入力します。',

};

function updateNavBtn(){
  const btn=document.getElementById('navToggleBtn');
  if(btn) btn.textContent=state.navEnabled ? 'ナビON' : 'ナビOFF';
}

function highlightEmptyFields(){
  if(!state.navEnabled) return;
  document.querySelectorAll('.assist-highlight').forEach(el=>el.classList.remove('assist-highlight'));
  const stage=stages[current];
  if(!stage||!stage.fields) return;
  stage.fields.forEach(f=>{
    const val=getValue(f.id);
    if(!val){
      const el=document.getElementById(f.id);
      if(el&&el.type!=='hidden') el.classList.add('assist-highlight');
    }
  });
}

function renderAssistPopup(){
  if(!state.navEnabled) return;
  const stage=stages[current];
  const key=stage.id;
  if(state.assistSeen[key]) return;
  const data=ASSIST_DATA[key];
  if(!data) return;
  state.assistSeen[key]=true;
  const overlay=document.createElement('div');
  overlay.className='assist-overlay';
  overlay.innerHTML=`
<div class="assist-dialog">
<div class="assist-dialog-inner">
<div class="assist-icon">💡</div>
<h3>${data.title}</h3>
<ul>${data.steps.map(s=>'<li>'+h(s)+'</li>').join('')}</ul>
<div class="assist-btn-row">
<button class="primary-btn" id="assistCloseBtn">はい、わかりました</button>
</div>
</div>
</div>`;
  document.body.appendChild(overlay);
  function closeAssist(){
    overlay.remove();
    highlightEmptyFields();
  }
  document.getElementById('assistCloseBtn').addEventListener('click',closeAssist);
  overlay.addEventListener('click',e=>{if(e.target===overlay) closeAssist();});
}

function bindMailEditorEvents(subjId, bodyId, statusId){
  document.getElementById(subjId)?.addEventListener('input',function(){state.mailTouched=true;state.mailSubjectEdit=this.value;});
  document.getElementById(bodyId)?.addEventListener('input',function(){state.mailTouched=true;state.mailBodyEdit=this.value;});
  document.getElementById('dlPathMailBtn')?.addEventListener('click',()=>{
    const d=emailDraft();
    const txt=`件名：${d.subject}\n\n${d.body}`;
    const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
    downloadBlob(blob, combinedMailFileName());
  });
  document.getElementById('copyPathMailBtn')?.addEventListener('click',()=>{
    const d=emailDraft();
    const txt=`件名：${d.subject}\n\n${d.body}`;
    copyToClipboard(txt).then(()=>{
      const el=document.getElementById(statusId || 'pathMailStatus');
      if(el){el.textContent='\u2705 \u30AF\u30EA\u30C3\u30D7\u30DC\u30FC\u30C9\u306B\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F\u3002';el.style.color='var(--success)';}
    });
  });
}

function toggleNav(){
  state.navEnabled=!state.navEnabled;
  if(!state.navEnabled) state.assistSeen={};
  renderAll();
}

function renderAll(){
  initMailEdits();
  renderMain();
  renderTemplate();
  updateModeUI();
  updateNavBtn();
  renderAssistPopup();
}
function resetAll(){
  current=stages.findIndex(s=>s.id==='intake');
  done=Array(stages.length).fill(false);
  Object.keys(checks).forEach(k=>checks[k]=false);
  state.appMode='front';
  state.loadedLedgerRows=[];
  state.loadedLedgerHeaders=[];
  state.selectedLedgerIndexes=[];
  state.requestRows=[{type:'初回公表',base:'特2025-17_2-1',date:'',url:'',facilityType:'',facilityDetail:''}];
  state.managerPaths=[];
  state.stepEnterTimestamp=null;
  state.stepDurations={};
  state.lastRenderedStageId=null;
  ['mailSubject','studyTitle','jrctNo','managerAffil1','managerDept1','managerTitle1','managerName1','managerAffil2','managerDept2','managerTitle2','managerName2','drafterName','drafterDept','sendDate','studyTypeSpecific','studyTypeUnapproved','studyTypeFunding','studyTypeNonspecific'].forEach(k=>{delete state[k];});
  state.draftDate=todayFormatted();
  fileStatuses={};
  state.assistSeen={};
  resetMailEdits();
  renderAll();
}
window.resetAll=resetAll;

document.getElementById('resetBtn').addEventListener('click',resetAll);
document.getElementById('modeFrontBtn').addEventListener('click',()=>{
  state.appMode='front';
  current=stages.findIndex(s=>s.id==='intake');
  renderAll();
});
document.getElementById('modeBackBtn').addEventListener('click',()=>{
  state.appMode='back';
  current=stages.findIndex(s=>s.id==='work');
  renderAll();
});
document.getElementById('navToggleBtn').addEventListener('click',toggleNav);

current=stages.findIndex(s=>s.id==='intake');
if(!state.draftDate) state.draftDate=todayFormatted();
renderAll();
</script>
