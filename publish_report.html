
<!DOCTYPE html>

<div>
<h1>管理者報告フロー統合パネル</h1>
<p>起案と管理者報告を切り替えて運用</p>
</div>
</div>
<div class="actions">
<div class="mode-group">
<button class="chip-btn active-mode" id="modeFrontBtn">起案</button>
<button class="chip-btn" id="modeBackBtn">管理者報告</button>
</div>
<button class="ghost-btn" id="navToggleBtn">ナビON</button>
<button class="ghost-btn" id="resetBtn" onclick="location.href='https://morikawa001.github.io/kanri_flow/procedure.html'">← 手続き選択に戻る</button>
<button class="icon-btn" id="guideBtn" aria-label="使い方ガイド" onclick="location.href='https://morikawa001.github.io/kanri_flow/guide.html'" title="使い方ガイド">📖</button>

<p id="headlineText">研究課題名・研究責任者などの共通情報を最初に入力し、複数依頼は1件ずつ管理します。台帳CSVを読み込むと途中から再開できます。</p>
</section>
<section class="flow-guide" id="flowGuide"></section>
<main class="main">
<section class="card" id="mainStage"></section>
<section class="card" id="templateStage"></section>
</main>

<script>var pageMode = 'publish';</script>
<script src="common.js?v=4cce68a"></script>
<script>
const stages = [
{
id:'intake',num:1,title:'案件受付・入口入力',
desc:'管理メールから研究課題名・研究責任者・研究区分を入力します。JRCTページの貼り付けまたは台帳CSVの読み込みで自動入力でき、後工程の起案文・報告案・メール案にそのまま反映されます。',
tags:['共通情報の入力','CSVで再開可能','JRCT自動入力'],
checks:[
['管理メールを確認した','「JRCTに公開されました、管理者報告をお願い」を確認する'],
['研究課題名・略称を入力した','起案文・報告案・メール件名に共通して使う情報'],
['研究責任者を入力した','所属・職名・氏名を最大2名分、報告メールの宛先に利用する'],
['研究区分を選択した','特定 or 非特定臨床研究。未承認・適応外・資金提供も該当する場合チェック'],
],
notes:[
['warn','入口で入力した情報は以降の全ステップで自動利用されるため、省略すると後工程で再入力が必要になる。'],
['info','台帳CSVを読み込むと、過去の案件情報がすべて復元され、続きから再開できる。']
],
fields:[
{id:'mailSubject',label:'研究略称',type:'text',placeholder:'例：STANDARD-SG'},
{id:'studyTitle',label:'研究課題名',type:'text',placeholder:'例：〇〇に関する特定臨床研究'},
{id:'jrctNo',label:'jRCT番号',type:'text',placeholder:'例：jRCTs042250017'},
{id:'managerAffil1',label:'研究責任者1 所属機関',type:'text',placeholder:'例：○○病院'},
{id:'managerDept1',label:'研究責任者1 所属部署',type:'text',placeholder:'例：呼吸器内科'},
{id:'managerTitle1',label:'研究責任者1 職名',type:'text',placeholder:'例：病院長'},
{id:'managerName1',label:'研究責任者1 氏名',type:'text',placeholder:'例：〇〇 〇〇'},
{id:'managerAffil2',label:'研究責任者2 所属機関',type:'text',placeholder:'例：○○大学'},
{id:'managerDept2',label:'研究責任者2 所属部署',type:'text',placeholder:'例：呼吸器内科'},
{id:'managerTitle2',label:'研究責任者2 職名',type:'text',placeholder:'例：教授'},
{id:'managerName2',label:'研究責任者2 氏名',type:'text',placeholder:'例：〇〇 〇〇'},
{id:'draftDate',label:'起案日',type:'text',placeholder:'yyyy/mm/dd（自動入力されます）'},
{id:'drafterName',label:'起案・報告案の報告者',type:'text',placeholder:'例：森川 〇〇'},
{id:'drafterDept',label:'所属・部門名',type:'text',placeholder:'例：臨床研究支援部門',options:['臨床研究管理・調整室']},
],
next:'次：フォルダ名を確認する',
},
{
id:'folders',num:2,title:'フォルダ名を確認',
desc:'ステップ1の依頼行ごとに、申請フォルダ・CSCC側公表フォルダ・管理者側公表フォルダの3種類が自動生成されます。起案番号をそのまま使うため手入力は不要です。',
tags:['フォルダ名自動生成','3種類を確認','手入力不要'],
checks:[
['申請フォルダ名を確認した','例：特2025-17_2-1_申請'],
['CSCC側公表フォルダ名を確認した','例：特2025-17_2-2_公表(cscc)'],
['管理者側公表フォルダ名を確認した','例：特2025-17_2-2_公表'],
],
notes:[
['info','管理者側フォルダの実パス（NAS上の場所）は、ステップ6で最終確定する。'],
['warn','フォルダ名はステップ1の起案番号から自動生成されるため、ここでの修正は不要。']
],
next:'次：起案文・報告案を作成する',
},
{
id:'drafts',num:3,title:'起案文・報告案・ZIP出力',
desc:'起案文テンプレート(.docx)と報告案テンプレート(.docx)に差し込みを行い、起案文・報告案・台帳CSV・フォルダZIPを生成します。生成されたZIPをダウンロードしてNASに展開してください。',
tags:['docx差し込み','CSV・ZIP生成','NASへ展開'],
checks:[
['起案文の報告事項欄を確認した','初回公表に変更・軽微変更が混在する場合の整理'],
['詳細欄の文面を確認した','jRCT URLまたは別紙のとおり'],
['報告案に同内容が反映されることを確認した','起案文ベースで自動反映'],
['フォルダZIPをダウンロードした','申請・CSCC側・管理者側の3フォルダを一括取得'],
['ZIPをNAS上の所定位置に展開した','ZIPを解凍してフォルダ配置を完了する'],
],
notes:[
['warn','複数依頼がある場合は、主たる報告事項を明確にし、付随事項を吸収する整理が必要。'],
['info','ブラウザからNASへ直接書き込めないため、ZIPダウンロード→NAS側で展開する流れになっている。'],
['info','台帳CSVはZIP内のCSCC側公表フォルダに保存される。'],
],
next:'次：ファイル名を最終確認',
},
{
id:'files',num:4,title:'ファイル名を最終確認',
desc:'各フォルダに格納するファイルの命名規則を一覧で確認します。命名ルールに従ってファイルをリネームし、必須資料のチェックリストで最終確認を行います。',
tags:['命名規則','表記ゆれ防止','チェックリスト'],
checks:[
['起案ファイル名を確認した','例：_00_起案'],
['管理者報告ファイル名を確認した','例：_01_管理者報告'],
['必須添付ファイルを確認した','各依頼行の必要書類を1件ずつ確認'],
['表記ゆれを確認した','一覧どおりに命名されているか最終確認'],
],
notes:[
['info','フォルダ作成は済んでいるため、格納するファイル名の最終確認ステップ。'],
],
next:'起案完了 → 決裁後に作業再開',
},
{
id:'work',num:5,title:'CSCC側フォルダで作業',
desc:'決裁が完了したら、台帳CSVを読み込んで案件を再開します。CSCC側公表フォルダに、起案の鏡スキャン・報告案PDF化・必要資料を格納します。',
tags:['台帳CSVで再開','資料格納','PDF化'],
checks:[
['台帳CSVを読み込んだ','研究課題名・研究責任者・依頼行が自動復元される'],
['起案の鏡をスキャン保存した','公表_00→公表_01などの変更を反映'],
['報告案の確認日を決裁日に合わせた','PDF化前に記入'],
['必要なPDF・Word資料を格納した','CSCC側フォルダへ収納'],
],
notes:[['info','台帳CSVから研究課題名・研究責任者・研究区分が自動復元されるため、再入力不要。']],
next:'次：管理者側フォルダに格納',
},
{
id:'path',num:6,title:'管理者側フォルダに格納・パス確定',
desc:'管理者側公表フォルダに資料を格納し、NAS上の保存パスを確定します。管理者報告メール案をテキストファイルとして保存し、CSCC側にショートカットを作成します。',
tags:['パス確定','メール案保存','ショートカット作成'],
checks:[
['管理者側公表フォルダへ格納した','対になるCSCC側フォルダと合わせて配置'],
['保存パスを取得した','メール本文に貼り付けるパスを確定'],
['管理者報告メール案を保存した','件名・本文をテキストファイルとして保存'],
['ショートカットをCSCC側に作成した','対になる関係がわかるようにする'],
],
notes:[
['warn','保存パスは入口では確定できず、このステップで最終確定する。'],
['info','メール案テキストは後から確認・再送する際の記録にもなる。']
],
fields:[],
next:'次：管理者報告メールを送信',
},
{
id:'send',num:7,title:'管理者報告メールを送信',
desc:'管理者報告メールの宛先・件名・本文を最終確認し、NAS保存パスを差し込んで送信します。送信後、更新済み台帳CSVをダウンロードして保存します。',
tags:['最終確認','送信','台帳更新'],
checks:[
['宛先が管理者になっていることを確認した','入口で入力済み（または台帳CSVから復元）'],
['件名・研究課題名を確認した','入口情報が反映済み'],
['NAS保存パスを貼り付けた','最後の未確定項目を差し込み'],
['内容確認後に送信した','管理者報告メールを送信'],
],
notes:[['info','台帳CSVにも研究課題名・研究責任者が引き続き記録され、次回の再開時に復元される。']],
fields:[],
next:'管理者報告完了',
}
];

let current = 0;
let done = Array(stages.length).fill(false);
let checks = {};
stages.forEach(s=>s.checks.forEach((c,idx)=>checks[`${s.id}_${idx}`]=false));

const state = {
  appMode:'front',
  navEnabled:false,
  loadedLedgerRows:[],
  loadedLedgerHeaders:[],
  selectedLedgerIndexes:[],
  requestRows:[{type:'初回公表',base:'特2025-17_2-1',date:'',url:'',facilityType:'',facilityDetail:''}],
  managerPaths:[],
  assistSeen:{},
  stepEnterTimestamp:null,
  stepDurations:{},
  lastRenderedStageId:null
};
let folderSelections = {};

let fileStatuses = {};
let templateDocxBuffer = null;
let templateDocxName = '';
let reportTemplateDocxBuffer = null;
let reportTemplateDocxName = '';

function renderMain(){
  syncCurrentToMode();
  const stage=stages[current];
  if(state.lastRenderedStageId && state.lastRenderedStageId!==stage.id && state.stepEnterTimestamp){
    const elapsed=Math.round((Date.now()-state.stepEnterTimestamp)/1000);
    state.stepDurations[state.lastRenderedStageId]=(state.stepDurations[state.lastRenderedStageId]||0)+elapsed;
  }
  if(state.lastRenderedStageId!==stage.id){
    state.stepEnterTimestamp=Date.now();
    state.lastRenderedStageId=stage.id;
  }
  const vis=visibleStages();
  const allDone=vis.every(s=>done[stages.findIndex(x=>x.id===s.id)]);
  const wrap=document.getElementById('mainStage');
  if(allDone){
    wrap.innerHTML=`
<div class="success-banner">
<div style="font-size:3rem">🎉</div>
<h3>${state.appMode==='front'?'起案完了':'管理者報告完了'}</h3>
<p class="small">${state.appMode==='front'
      ? '台帳CSVひな型とフォルダZIPの作成まで完了しました。'
      : '台帳CSVの読込から更新済み台帳CSV出力まで完了しました。'}</p>
<div style="margin-top:1rem"><button class="primary-btn" onclick="resetAll()">新しい案件を開始</button></div>
</div>`;return;
  }

  const standardFields=(stage.fields||[]).filter(f=>!['managerAffil1','managerDept1','managerTitle1','managerName1','managerAffil2','managerDept2','managerTitle2','managerName2'].includes(f.id));
  const fieldHTML=standardFields.map(f=>{
    if(f.options && f.options.length){
      const currentVal = state[f.id] || '';
      const isPreset = f.options.includes(currentVal);
      return `<div class="field"><label>${h(f.label)}</label>
<div style="display:grid;gap:.35rem">
<select class="input" data-preset-select="${f.id}" style="height:auto;padding:.45rem .6rem">
<option value="">選択してください</option>
${f.options.map(o=>`<option value="${h(o)}" ${currentVal===o?'selected':''}>${h(o)}</option>`).join('')}
<option value="__free" ${!isPreset && currentVal ? 'selected':''}>自由記載</option>
</select>
<input class="input" data-preset-free="${f.id}" id="${f.id}" value="${h(currentVal)}" placeholder="${h(f.placeholder||'')}" ${!isPreset && currentVal ? '':'style="display:none"'}></div></div>`;
    }
    return `<div class="field"><label>${h(f.label)}</label>
<input type="${h(f.type||'text')}" class="input" data-bind="${f.id}" id="${f.id}" value="${h(state[f.id]||'')}" placeholder="${h(f.placeholder||'')}"></div>`;
  }).join('');
  const managerHTML=stage.id==='intake' ? `
<div class="section-title">研究区分</div>
<div class="study-type-wrap" style="margin-top:.7rem">
  <div class="study-group ${state.studyTypeSpecific ? 'selected' : ''}">
    <label class="checkitem study-main ${state.studyTypeSpecific ? 'checked' : ''}">
      <input type="checkbox" data-bind="studyTypeSpecific" id="studyTypeSpecific" ${state.studyTypeSpecific ? 'checked' : ''}>
      <div>
        <strong>特定臨床研究</strong>
        <span>必要に応じて未承認・適応外、資金提供も選択します。</span>
      </div>
    </label>

    <div class="study-subgrid">
      <label class="checkitem study-sub ${state.studyTypeUnapproved ? 'checked' : ''}">
        <input type="checkbox" data-bind="studyTypeUnapproved" id="studyTypeUnapproved" ${state.studyTypeUnapproved ? 'checked' : ''}>
        <div><strong>未承認・適応外</strong></div>
      </label>

      <label class="checkitem study-sub ${state.studyTypeFunding ? 'checked' : ''}">
        <input type="checkbox" data-bind="studyTypeFunding" id="studyTypeFunding" ${state.studyTypeFunding ? 'checked' : ''}>
        <div><strong>資金提供</strong></div>
      </label>
    </div>
  </div>

  <label class="checkitem study-group study-single ${state.studyTypeNonspecific ? 'checked' : ''}">
    <input type="checkbox" data-bind="studyTypeNonspecific" id="studyTypeNonspecific" ${state.studyTypeNonspecific ? 'checked' : ''}>
    <div><strong>非特定臨床研究</strong></div>
  </label>

  <div class="help">選択結果：${h(studyCategoryLabel()||'未選択')}</div>
</div>
<div class="section-title">研究責任者</div>
<div class="template-card" style="margin-top:.7rem">
<div class="help" style="margin-bottom:.7rem">2人目は空欄可です。入力がある場合のみメール本文やCSVの研究責任者欄に追加表示されます。</div>
<div class="grid-4">
<div class="field"><label>所属機関</label><input class="input" data-bind="managerAffil1" id="managerAffil1" value="${h(state.managerAffil1||'')}" placeholder="例：○○病院"></div>
<div class="field"><label>所属部署</label><input class="input" data-bind="managerDept1" id="managerDept1" value="${h(state.managerDept1||'')}" placeholder="例：呼吸器内科"></div>
<div class="field"><label>職名</label><input class="input" data-bind="managerTitle1" id="managerTitle1" value="${h(state.managerTitle1||'')}" placeholder="例：病院長"></div>
<div class="field"><label>氏名</label><input class="input" data-bind="managerName1" id="managerName1" value="${h(state.managerName1||'')}" placeholder="例：〇〇 〇〇"></div>
</div>
<div class="grid-4" style="margin-top:.7rem">
<div class="field"><label>所属機関</label><input class="input" data-bind="managerAffil2" id="managerAffil2" value="${h(state.managerAffil2||'')}" placeholder="例：○○大学"></div>
<div class="field"><label>所属部署</label><input class="input" data-bind="managerDept2" id="managerDept2" value="${h(state.managerDept2||'')}" placeholder="例：呼吸器内科"></div>
<div class="field"><label>職名</label><input class="input" data-bind="managerTitle2" id="managerTitle2" value="${h(state.managerTitle2||'')}" placeholder="例：教授"></div>
<div class="field"><label>氏名</label><input class="input" data-bind="managerName2" id="managerName2" value="${h(state.managerName2||'')}" placeholder="例：〇〇 〇〇"></div>
</div>
</div>` : '';

  const generatedHTML =
    stage.id==='folders'
      ? `
<div class="section-title">ステップ1の依頼行から自動生成されたフォルダ名</div>
${requestRowsData().map((r,i)=>{
   const fs=folderSetFor(r);
   return `<div class="template-card" style="margin-top:.7rem">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem">
<strong style="font-size:.82rem">依頼 ${i+1}：${h(r.type)}</strong><span class="badge">${h(`${fs.no}_${outputCategory(r.type)}`)}</span></div>
<div class="grid-2">
<div class="field"><label>申請フォルダ名</label><input class="input readonly" readonly value="${h(fs.apply)}"></div>
<div class="field"><label>CSCC側公表フォルダ名</label><input class="input readonly" readonly value="${h(fs.cscc)}"></div>
</div>
<div class="grid-2" style="margin-top:.7rem">
<div class="field"><label>管理者側公表フォルダ名</label><input class="input readonly" readonly value="${h(fs.manager)}"></div>
</div>
</div>`;
}).join('')}`
        : stage.id==='drafts'
      ? `

function parseJRCTHtml(input){
  const data={};
  let text='';
  if(input.includes('<th')||input.includes('<td')){
    const parser=new DOMParser();
    const doc=parser.parseFromString(input,'text/html');
    text=doc.body?.innerText||input;
  }else{
    text=input;
  }
  const lines=text.split('\n').map(s=>s.replace(/\r/g,'').trim()).filter(Boolean);
  const SKIP=/^(Name|氏名|\/|Affiliation|所属|Address|住所|Phone|電話|FAX|Email|電子メール|Plan|計画|e-Rad|〒|（個人|（組織|（施設|（多|Data|Patient|Among|Patholog|EGFR|Grade|Any|Thrombo|One|In |A |The |Although|Recurrence|Although|Result|Baseline|Participant|Brief|No|Phase)/i;
  function isValue(v,label){
    if(!v||v.length<2) return false;
    if(label&&v.includes(label)) return false;
    if(SKIP.test(v)) return false;
    return true;
  }
  function findVal(label){
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      if(!line.includes(label)) continue;
      const parts=line.split('\t');
      if(parts.length>=2){
        for(let k=0;k<parts.length;k++){
          if(parts[k].trim().includes(label)){
            for(let p=k+1;p<parts.length;p++){
              const v=parts[p].trim();
              if(isValue(v,label)) return v;
            }
          }
        }
      }
      for(let j=i+1;j<Math.min(i+4,lines.length);j++){
        const v=lines[j].split('\t')[0].trim();
        if(isValue(v,label)) return v;
      }
    }
    return '';
  }
  function findAllVal(label){
    const results=[];
    let found=false;
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      if(!line.includes(label)) continue;
      found=false;
      const parts=line.split('\t');
      if(parts.length>=2){
        for(let k=0;k<parts.length;k++){
          if(parts[k].trim().includes(label)){
            for(let p=k+1;p<parts.length;p++){
              const v=parts[p].trim();
              if(isValue(v,label)){results.push(v);found=true;break;}
            }
            break;
          }
        }
      }
      if(!found){
        for(let j=i+1;j<Math.min(i+4,lines.length);j++){
          const v=lines[j].split('\t')[0].trim();
          if(isValue(v,label)){results.push(v);break;}
        }
      }
    }
    return results;
  }
  data.mailSubject=findVal('平易な研究名称')||findVal('Public Title');
  data.studyTitle=findVal('研究名称')||findVal('Scientific Title');
  data.managerName1=(findVal('統括管理者の氏名')||'').replace(/\s{2,}/g,' ').replace(/^[\s\u3000]+|[\s\u3000]+$/g,'');
  data.managerAffil1=findVal('統括管理者の所属機関')||findVal('所属機関（実施医療機関）');
  const mgrDept=findVal('統括管理者の所属部署');
  if(mgrDept&&!mgrDept.includes('担当者')) data.managerDept1=mgrDept;
  const contactNames=findAllVal('担当者氏名');
  if(contactNames.length>0) data.managerName2=contactNames[0].replace(/\s{2,}/g,' ').replace(/^[\s\u3000]+|[\s\u3000]+$/g,'');
  data.managerAffil2=findVal('担当者所属機関');
  data.managerDept2=findVal('担当者所属部署');
  const jrctText=findVal('臨床研究実施計画番号')||findVal('jRCT番号');
  if(jrctText){const m=jrctText.match(/jRCT\w+/);if(m) data.jrctNo=m[0];}
  const fundingLines=findAllVal('研究資金等の提供の有無');
  data.isFunding=fundingLines.some(f=>f.includes('あり'));
  const researchType=findVal('研究の種別');
  data.isSpecific=!!(researchType&&researchType.includes('特定'));
  data.isNonspecific=!!(researchType&&researchType.includes('非特定'));
  const approvalStatus=findVal('医薬品医療機器等法における未承認、適応外、承認内の別');
  const unapprovedCheck=findVal('著しい負担を与える検査その他の行為において未承認又は適応外の医薬品等の使用の有無');
  data.isUnapproved=!!(
    (approvalStatus&&(approvalStatus.includes('未承認')||approvalStatus.includes('適応外')))||
    (unapprovedCheck&&unapprovedCheck.includes('あり'))
  );
  const pubDateText=findVal('最終公表日')||findVal('初回公表日');
  if(pubDateText){
    let m=pubDateText.match(/令和(\d+)年(\d+)月(\d+)日/);
    if(m){const y=2018+parseInt(m[1]);data.pubDate=y+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0');}
    else{m=pubDateText.match(/平成(\d+)年(\d+)月(\d+)日/);
    if(m){const y=1988+parseInt(m[1]);data.pubDate=y+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0');}
    else{m=pubDateText.match(/(\d{4})年(\d+)月(\d+)日/);if(m) data.pubDate=m[1]+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0');}}
  }
  data.jrctUrl='https://jrct.mhlw.go.jp/latest-detail/'+(data.jrctNo||'');
  return data;
}
function applyJRCTData(data){
  function setVal(id,val){
    if(!val) return;
    state[id]=val;
    const el=document.querySelector('[data-bind="'+id+'"]');
    if(!el) return;
    const s=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value').set;
    s.call(el,val);
    el.dispatchEvent(new Event('input',{bubbles:true}));
    el.dispatchEvent(new Event('change',{bubbles:true}));
  }
  setVal('mailSubject',data.mailSubject);
  setVal('studyTitle',data.studyTitle);
  setVal('jrctNo',data.jrctNo);
  setVal('managerAffil1',data.managerAffil1);
  setVal('managerDept1',data.managerDept1);
  setVal('managerTitle1',data.managerTitle1);
  setVal('managerName1',data.managerName1);
  setVal('managerAffil2',data.managerAffil2);
  setVal('managerDept2',data.managerDept2);
  setVal('managerTitle2',data.managerTitle2);
  setVal('managerName2',data.managerName2);
  if(data.isSpecific){
    const el=document.getElementById('studyTypeSpecific');
    if(el&&!el.checked) el.click();
    const ns=document.getElementById('studyTypeNonspecific');
    if(ns&&ns.checked) ns.click();
    state.studyTypeNonspecific=false;
  }
  if(data.isNonspecific){
    const el=document.getElementById('studyTypeNonspecific');
    if(el&&!el.checked) el.click();
    const sp=document.getElementById('studyTypeSpecific');
    if(sp&&sp.checked) sp.click();
    state.studyTypeSpecific=false;
    state.studyTypeUnapproved=false;
    state.studyTypeFunding=false;
    const ua=document.getElementById('studyTypeUnapproved');
    if(ua&&ua.checked) ua.click();
    const fd=document.getElementById('studyTypeFunding');
    if(fd&&fd.checked) fd.click();
  }
  if(data.isUnapproved){const el=document.getElementById('studyTypeUnapproved');if(el&&!el.checked) el.click();}
  if(data.isFunding){const el=document.getElementById('studyTypeFunding');if(el&&!el.checked) el.click();}
  if(data.pubDate&&state.requestRows&&state.requestRows[0]){
    state.requestRows[0].date=data.pubDate;
  }
  if(data.jrctUrl&&state.requestRows&&state.requestRows[0]){
    state.requestRows[0].url=data.jrctUrl;
  }
  renderAll();
}

function updateNavBtn(){

function highlightEmptyFields(){
  if(!state.navEnabled) return;
  document.querySelectorAll('.assist-highlight').forEach(el=>el.classList.remove('assist-highlight'));
  const stage=stages[current];
  if(!stage||!stage.fields) return;
  stage.fields.forEach(f=>{
    const val=getValue(f.id);
    if(!val){
      const el=document.getElementById(f.id);
      if(el&&el.type!=='hidden') el.classList.add('assist-highlight');
    }
  });

function renderAssistPopup(){
  if(!state.navEnabled) return;

<button class="primary-btn" id="assistCloseBtn">はい、わかりました</button>
</div>
</div>
</div>`;
